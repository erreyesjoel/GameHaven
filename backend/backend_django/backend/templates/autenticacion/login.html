{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<!-- Font Awesome CDN para iconos -->
<!-- Icono de gamepad -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<div class="login-bg">
  <div class="login-container">
    <h1><i class="fa-solid fa-gamepad"></i> GameHaven</h1>
    <form>
      <div class="input-group">
        <label for="email"><i class="fa-solid fa-envelope"></i></label>
        <input type="email" id="email" name="email" placeholder="Introduce tu email" required>
      </div>
      <div class="input-group">
        <label for="password"><i class="fa-solid fa-lock"></i></label>
        <input type="password" id="password" name="password" placeholder="Introduce tu contraseña" required>
      </div>
      <button type="submit"><i class="fa-solid fa-arrow-right"></i> Entrar</button>
    </form>
  </div>
</div>
