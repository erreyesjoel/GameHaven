{% include 'components/header/header.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<div class="main-content">
<div class="container-formulario">
  <form class="juego-formulario" method="POST" action="">
    {% csrf_token %}
    <div class="juego-formulario-header">
      <svg class="icon-move" width="32" height="32" style="vertical-align: middle;">
        <use xlink:href="{% static 'icons/sprite.svg' %}#custom-move"></use>
      </svg>
      <h1>Editar Usuario: {{ usuario.username }}</h1>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="username">Nombre de usuario:</label>
        <input type="text" id="username" name="username" value="{{ usuario.username }}" required>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ usuario.email }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="first_name">Nombre:</label>
        <input type="text" id="first_name" name="first_name" value="{{ usuario.first_name }}">
      </div>
      <div class="form-group">
        <label for="last_name">Apellidos:</label>
        <input type="text" id="last_name" name="last_name" value="{{ usuario.last_name }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="rol">Rol:</label>
        <select id="rol" name="rol" required>
          {% for value, label in roles %}
            <option value="{{ value }}" {% if usuario.rol == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <button type="submit" class="btn-enviar-formulario">Guardar Cambios</button>
    <a href="{% url 'listar_usuarios' %}" class="btn-cancelar" style="text-decoration: none; display: inline-block; margin-left: 10px; color: #666;">Cancelar</a>
  </form>
</div>
</div>
