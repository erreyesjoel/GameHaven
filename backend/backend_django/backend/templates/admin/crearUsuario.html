{% include 'components/header/header.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<div class="main-content">
<div class="container-formulario">
  <form class="juego-formulario" method="POST" action="{% url 'crear_usuario' %}">
    {% csrf_token %}
    <div class="juego-formulario-header">
      <!-- Usamos el mismo icono o uno similar del sprite -->
      <svg class="icon-move" width="32" height="32" style="vertical-align: middle;">
        <use xlink:href="{% static 'icons/sprite.svg' %}#user-plus"></use>
      </svg>
      <h1>Nuevo Usuario</h1>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label for="username">Nombre de usuario:</label>
        <input type="text" id="username" name="username" placeholder="Escribe el username..." required>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="first_name">Nombre:</label>
        <input type="text" id="first_name" name="first_name" placeholder="Nombre real">
      </div>
      <div class="form-group">
        <label for="last_name">Apellidos:</label>
        <input type="text" id="last_name" name="last_name" placeholder="Apellidos">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="rol">Rol:</label>
        <select id="rol" name="rol" required>
          <option value="" disabled selected>Selecciona un rol...</option>
          {% for value, label in roles %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group full-width" style="margin-top: 10px; color: #666; font-size: 0.9rem;">
        <p><i class="fas fa-info-circle"></i> Al crear el usuario, se le enviará automáticamente un correo para que defina su contraseña.</p>
    </div>

    <button type="submit" class="btn-enviar-formulario">Crear y Enviar Correo</button>
    <a href="{% url 'listar_usuarios' %}" class="btn-cancelar" style="text-decoration: none; display: inline-block; margin-left: 10px; color: #666;">Cancelar</a>
  </form>
</div>
</div>
