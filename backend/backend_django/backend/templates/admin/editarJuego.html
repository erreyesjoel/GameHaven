{% include 'components/header/header.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<div class="main-content">
<form class="edit-game-form" method="POST" action="">
  {% csrf_token %}
  <h1>Editar Juego: {{ juego.titulo }}</h1>
  <div class="form-group">
    <label for="titulo">Título:</label>
    <input type="text" id="titulo" name="titulo" value="{{ juego.titulo }}" required>
  </div>
  <div class="form-group">
    <label for="descripcion">Descripción:</label>
    <textarea id="descripcion" name="descripcion" required>{{ juego.descripcion }}</textarea>
  </div>
  <div class="form-group">
    <label for="stock">Stock:</label>
    <input type="number" id="stock" name="stock" value="{{ juego.stock }}" required>
  </div>
  <div class="form-group">
    <label for="precio">Precio:</label>
    <input type="number" id="precio" name="precio" value="{{ juego.precio }}" required>
  </div>
  <div class="form-group">
    <label for="fecha_lanzamiento">Fecha de lanzamiento:</label>
    <input type="date" id="fecha_lanzamiento" name="fecha_lanzamiento" value="{{ juego.fecha_lanzamiento }}" required>
  </div>
  <div class="form-group">
    <label for="categoria">Categoría:</label>
    <select id="categoria" name="categoria" required>
      <option value="ACCION" {% if juego.categoria == 'ACCION' %}selected{% endif %}>Acción</option>
      <option value="AVENTURA" {% if juego.categoria == 'AVENTURA' %}selected{% endif %}>Aventura</option>
      <option value="DEPORTES" {% if juego.categoria == 'DEPORTES' %}selected{% endif %}>Deportes</option>
      <option value="ESTRATEGIA" {% if juego.categoria == 'ESTRATEGIA' %}selected{% endif %}>Estrategia</option>
      <option value="ROL" {% if juego.categoria == 'ROL' %}selected{% endif %}>Rol</option>
      <option value="SIMULACION" {% if juego.categoria == 'SIMULACION' %}selected{% endif %}>Simulación</option>
      <option value="PUZZLE" {% if juego.categoria == 'PUZZLE' %}selected{% endif %}>Puzzle</option>    
    </select>
  </div>
  <div class="form-group">
    <label for="pegi">PEGI:</label>
    <select id="pegi" name="pegi" required>
      <option value="3" {% if juego.pegi == 3 %}selected{% endif %}>3</option>
      <option value="7" {% if juego.pegi == 7 %}selected{% endif %}>7</option>
      <option value="12" {% if juego.pegi == 12 %}selected{% endif %}>12</option>
      <option value="16" {% if juego.pegi == 16 %}selected{% endif %}>16</option>
      <option value="18" {% if juego.pegi == 18 %}selected{% endif %}>18</option>
    </select>
  </div>
  <div class="form-group">
    <label for="foto_juego_url">URL de la foto del juego:</label>
    {% with foto=juego.fotos_juegos_set.first %}
      <input type="url" id="foto_juego_url" name="foto_juego_url" value="{% if foto %}{{ foto.url }}{% endif %}">
    {% endwith %}
  </div>
  <button type="submit" class="btn-submit">Guardar Cambios</button>
</form>
