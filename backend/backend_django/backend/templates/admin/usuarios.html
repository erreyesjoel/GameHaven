{% include 'components/header/header.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<div class="main-content">
  <div class="table-wrapper">
    <div class="table-header">
      <h1>Usuarios</h1>
      <a href="/usuarios/crear" class="btn-nuevo">
        Nuevo usuario
      </a>
    </div>
    <table class="table-app">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        {% for usuario in lista_usuarios %}
        <tr>
          <td>{{ usuario.id }}</td>
          <td><span class="table-title">{{ usuario.username }}</span></td>
          <td>{{ usuario.email }}</td>
          <td>{{ usuario.rol }}</td>
          <td class="table-actions">
            <!-- Icono Editar -->
            <a href="/usuarios/{{ usuario.id }}/editar" title="Editar">
              <svg class="icon-action" width="24" height="24">
                <use xlink:href="{% static 'icons/sprite.svg' %}#pencil-edit"></use>
              </svg>
            </a>
            <!-- Icono Eliminar -->
            <a href="#" title="Eliminar" class="delete-link" data-id="{{ usuario.id }}" data-tipo="usuarios">
              <svg class="icon-action trash" width="24" height="24">
                <use xlink:href="{% static 'icons/sprite.svg' %}#trash-delete"></use>
              </svg>
            </a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% include 'components/modalEliminar.html' %}
  <script src="{% static 'js/Modal.js' %}"></script>
</div>
