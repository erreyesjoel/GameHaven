{% include 'components/header/header.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">

<div class="container-formulario">
  <form class="juego-formulario" method="POST" action="">
    {% csrf_token %}
    <div class="juego-formulario-header">
      <h1>Crear Juego</h1>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" name="titulo" required>
      </div>
      <div class="form-group">
        <label for="precio">Precio:</label>
        <input type="number" id="precio" name="precio" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="stock">Stock:</label>
        <input type="number" id="stock" name="stock" required>
      </div>
      <div class="form-group">
        <label for="fecha_lanzamiento">Fecha de lanzamiento:</label>
        <input type="date" id="fecha_lanzamiento" name="fecha_lanzamiento" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="categoria">Categoría:</label>
        <select id="categoria" name="categoria" required>
          {% for categoria in categorias %}
            <option value="{{ categoria.id }}">{{ categoria.get_nombre_categoria_display }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="pegi">PEGI:</label>
        <select id="pegi" name="pegi" required>
          <option value="3">3</option>
          <option value="7">7</option>
          <option value="12">12</option>
          <option value="16">16</option>
          <option value="18">18</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="foto_juego_url">URL de la foto del juego:</label>
        <input type="url" id="foto_juego_url" name="foto_juego_url">
      </div>
      <div class="form-group">
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" required></textarea>
      </div>
    </div>
    <button type="submit" class="btn-enviar-formulario">Crear Juego</button>
  </form>
</div>
