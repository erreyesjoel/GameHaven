{% include 'components/header/header.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<div class="main-content">
    <div class="table-wrapper">
        <div class="table-header">
            <h1>Plataformas</h1>
            <a href="{% url 'crear_plataforma' %}" class="btn-nuevo">Nueva plataforma
            </a>
        </div>
        <table class="table-app">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                </tr>
            </thead>
            <tbody>
                {% for plataforma in plataformas %}
                <tr>
                    <td>{{ plataforma.id }}</td>
                    <td>{{ plataforma.get_tipo_display }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">No hay plataformas disponibles.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
</div>
