{% include 'components/header/header.html' %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<div class="main-content">
    <div class="table-wrapper">
        <div class="table-header">
            <h1>Plataformas</h1>
            <a href="{% url 'crear_plataforma' %}" class="btn-nuevo">Nueva plataforma
            </a>
        </div>
        <table class="table-app">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for plataforma in plataformas %}
                <tr>
                    <td>{{ plataforma.id }}</td>
                    <td>{{ plataforma.get_tipo_display }}</td>
                    <td class="table-actions">
                        <a href="{% url 'editar_plataforma' plataforma.id %}" title="Editar">
                            <svg class="icon-action" width="24" height="24">
                                <use xlink:href="{% static 'icons/sprite.svg' %}#pencil-edit"></use>
                            </svg>
                        </a>
                        <a href="/plataformas/eliminar/{{ plataforma.id }}/" title="Eliminar">
                            <svg class="icon-action trash" width="24" height="24">
                                <use xlink:href="{% static 'icons/sprite.svg' %}#trash-delete"></use>
                            </svg>
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3">No hay plataformas disponibles.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
