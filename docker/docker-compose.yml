version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_USER: postgresJoel
      POSTGRES_PASSWORD: joel_PosTgres
      POSTGRES_DB: gamehaven_db
    ports:
      - "5433:5432" # pongo 5433 porque tengo el postgres local en el 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: postgres-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: joel@gmail.com 
      PGADMIN_DEFAULT_PASSWORD: joel_pgadmin
    ports:
      - "8092:80"
    depends_on:
      - postgres

volumes:
  postgres_data: